<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Web Panel</title>
  <style>
    body{font-family:Arial,sans-serif;margin:0;background:#0f172a;color:#e2e8f0}
    .wrap{max-width:1200px;margin:0 auto;padding:18px}
    .card{background:#111827;border:1px solid #334155;border-radius:12px;padding:14px;margin-bottom:12px}
    input,textarea,select,button{background:#0b1220;color:#e2e8f0;border:1px solid #334155;border-radius:8px;padding:8px}
    textarea{width:100%;min-height:110px}
    table{width:100%;border-collapse:collapse}
    th,td{border-bottom:1px solid #334155;padding:8px;text-align:left;vertical-align:top}
    .tabs button{margin-right:8px}
    .hidden{display:none}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .ok{color:#22c55e}.err{color:#f87171}.muted{color:#94a3b8}
  </style>
</head>
<body>
<div class="wrap">
  <h2>Admin Web Panel</h2>

  <div id="loginCard" class="card hidden">
    <h3>Đang nh?p qu?n tr?</h3>
    <input id="password" type="password" placeholder="Nh?p ADMIN_PASSWORD" />
    <button onclick="login()">Đang nh?p</button>
    <div id="loginMsg" class="muted"></div>
  </div>

  <div id="app" class="hidden">
    <div class="card tabs">
      <button onclick="showTab('products')">S?n ph?m</button>
      <button onclick="showTab('stock')">Kho</button>
      <button onclick="showTab('orders')">Đon hŕng</button>
      <button onclick="logout()" style="float:right">Đang xu?t</button>
    </div>

    <div id="msg" class="card muted"></div>

    <div id="tab-products" class="card">
      <h3>S?n ph?m</h3>
      <div class="row">
        <input id="p_id" placeholder="id (vd: netflix_pre_1m_bhf)" />
        <input id="p_name" placeholder="Tęn s?n ph?m" />
        <input id="p_price" type="number" placeholder="Giá" />
        <input id="p_emoji" placeholder="Emoji" value="??" />
      </div>
      <textarea id="p_desc" placeholder="Mô t?"></textarea>
      <textarea id="p_features" placeholder="Tính nang (không b?t bu?c)"></textarea>
      <input id="p_image" placeholder="Image URL (không b?t bu?c)" />
      <div style="margin-top:8px"><button onclick="createProduct()">Thęm s?n ph?m</button></div>
      <table id="productsTable"></table>
    </div>

    <div id="tab-stock" class="card hidden">
      <h3>Kho tŕi kho?n</h3>
      <select id="stockProduct"></select>
      <input id="imageFile" type="file" accept="image/png,image/jpeg,image/webp" />
      <button onclick="uploadImage()">Upload ?nh cho s?n ph?m dang ch?n</button>
      <p class="muted">Dán danh sách tŕi kho?n, m?i dňng 1 tŕi kho?n.</p>
      <textarea id="stockLines" placeholder="mail|pass"></textarea>
      <div>
        <button onclick="saveStock('append')">Thęm ti?p</button>
        <button onclick="saveStock('replace')">Ghi dč</button>
        <button onclick="loadStock()">T?i kho hi?n t?i</button>
      </div>
      <pre id="stockPreview" class="muted"></pre>
    </div>

    <div id="tab-orders" class="card hidden">
      <h3>Đon hŕng</h3>
      <select id="orderFilter" onchange="loadOrders()">
        <option value="">T?t c?</option>
        <option value="pending">pending</option>
        <option value="paid">paid</option>
        <option value="cancelled">cancelled</option>
      </select>
      <table id="ordersTable"></table>
    </div>
  </div>
</div>

<script>
const state = { products: [] };

function setMsg(msg, ok = true) {
  const e = document.getElementById('msg');
  e.className = 'card ' + (ok ? 'ok' : 'err');
  e.textContent = msg;
}

function showTab(name) {
  ['products','stock','orders'].forEach((t) => document.getElementById('tab-' + t).classList.add('hidden'));
  document.getElementById('tab-' + name).classList.remove('hidden');
  if (name === 'orders') loadOrders();
}

async function api(path, opt = {}) {
  const res = await fetch(path, {
    credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    ...opt,
  });
  if (res.status === 401) throw new Error('Chua dang nh?p');
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
  return data;
}

async function bootstrap() {
  const s = await api('/admin/api/session');
  if (!s.configured) {
    document.body.innerHTML = '<div class="wrap"><div class="card err">Chua c?u hěnh ADMIN_PASSWORD tręn server.</div></div>';
    return;
  }
  if (!s.authenticated) {
    document.getElementById('loginCard').classList.remove('hidden');
    return;
  }
  document.getElementById('app').classList.remove('hidden');
  await loadProducts();
}

async function login() {
  try {
    await api('/admin/login', { method: 'POST', body: JSON.stringify({ password: document.getElementById('password').value }) });
    location.reload();
  } catch (e) {
    document.getElementById('loginMsg').textContent = e.message;
  }
}

async function logout() {
  await api('/admin/logout', { method: 'POST' });
  location.reload();
}

function productForm() {
  return {
    id: p_id.value,
    name: p_name.value,
    price: Number(p_price.value || 0),
    emoji: p_emoji.value,
    description: p_desc.value,
    features: p_features.value,
    image: p_image.value,
  };
}

async function createProduct() {
  try {
    await api('/admin/api/products', { method: 'POST', body: JSON.stringify(productForm()) });
    setMsg('Đă thęm s?n ph?m');
    await loadProducts();
  } catch (e) {
    setMsg(e.message, false);
  }
}

async function updateProduct(id) {
  const row = document.querySelector('[data-id="' + id + '"]');
  const payload = {
    name: row.querySelector('.name').value,
    price: Number(row.querySelector('.price').value || 0),
    emoji: row.querySelector('.emoji').value,
    description: row.querySelector('.description').value,
    features: row.querySelector('.features').value,
    image: row.querySelector('.image').value,
  };
  try {
    await api('/admin/api/products/' + encodeURIComponent(id), { method: 'PUT', body: JSON.stringify(payload) });
    setMsg('Đă c?p nh?t ' + id);
    await loadProducts();
  } catch (e) {
    setMsg(e.message, false);
  }
}

async function deleteProduct(id) {
  if (!confirm('Xóa ' + id + '?')) return;
  try {
    await api('/admin/api/products/' + encodeURIComponent(id), { method: 'DELETE' });
    setMsg('Đă xóa ' + id);
    await loadProducts();
  } catch (e) {
    setMsg(e.message, false);
  }
}

async function loadProducts() {
  try {
    const data = await api('/admin/api/products');
    state.products = data.products || [];
    const table = document.getElementById('productsTable');
    const rows = state.products.map((p) => {
      return '<tr data-id="' + p.id + '">' +
        '<td><b>' + esc(p.id) + '</b></td>' +
        '<td><input class="name" value="' + esc(p.name) + '" />' +
        '<input class="price" type="number" value="' + p.price + '" />' +
        '<input class="emoji" value="' + esc(p.emoji || '') + '" /></td>' +
        '<td><textarea class="description">' + esc(p.description || '') + '</textarea>' +
        '<textarea class="features">' + esc(p.features || '') + '</textarea>' +
        '<input class="image" value="' + esc(p.image || '') + '" /></td>' +
        '<td>' + p.stock + '</td>' +
        '<td><button onclick="updateProduct(\'' + escJs(p.id) + '\')">Luu</button> ' +
        '<button onclick="deleteProduct(\'' + escJs(p.id) + '\')">Xóa</button></td>' +
      '</tr>';
    }).join('');

    table.innerHTML = '<tr><th>ID</th><th>Tęn/Giá</th><th>Mô t?</th><th>Kho</th><th>Actions</th></tr>' + rows;

    const sel = document.getElementById('stockProduct');
    sel.innerHTML = state.products.map((p) => '<option value="' + esc(p.id) + '">' + esc(p.id + ' - ' + p.name) + '</option>').join('');
    if (state.products.length) loadStock();
  } catch (e) {
    setMsg(e.message, false);
  }
}

async function loadStock() {
  try {
    const id = stockProduct.value;
    if (!id) return;
    const d = await api('/admin/api/stock/' + encodeURIComponent(id));
    stockPreview.textContent = 'S? dňng: ' + d.count + '\n\n' + (d.lines || []).join('\n');
  } catch (e) {
    setMsg(e.message, false);
  }
}

async function saveStock(mode) {
  try {
    const id = stockProduct.value;
    const lines = stockLines.value;
    const d = await api('/admin/api/stock/' + encodeURIComponent(id), {
      method: 'POST',
      body: JSON.stringify({ mode, lines }),
    });
    setMsg('Đă luu kho ' + id + ' (' + d.count + ' dňng)');
    await loadProducts();
  } catch (e) {
    setMsg(e.message, false);
  }
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(String(r.result).split(',')[1] || '');
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

async function uploadImage() {
  try {
    const id = stockProduct.value;
    const file = imageFile.files[0];
    if (!id || !file) {
      setMsg('Ch?n s?n ph?m vŕ file ?nh', false);
      return;
    }

    const ext = (file.name.split('.').pop() || '').toLowerCase();
    if (!['jpg','jpeg','png','webp'].includes(ext)) {
      setMsg('Ch? h? tr? jpg/jpeg/png/webp', false);
      return;
    }

    const dataBase64 = await toBase64(file);
    await api('/admin/api/image/' + encodeURIComponent(id), {
      method: 'POST',
      body: JSON.stringify({ ext, dataBase64 }),
    });
    setMsg('Đă upload ?nh cho ' + id);
  } catch (e) {
    setMsg(e.message, false);
  }
}

async function loadOrders() {
  try {
    const status = orderFilter.value;
    const d = await api('/admin/api/orders' + (status ? ('?status=' + encodeURIComponent(status)) : ''));
    const table = document.getElementById('ordersTable');
    const rows = (d.orders || []).map((o) => {
      const delivered = (o.delivered || []).join('\n');
      return '<tr>' +
        '<td>' + esc(o.refCode || o.orderCode || '-') + '</td>' +
        '<td>' + esc((o.productName || '-') + ' x' + (o.quantity || 1)) + '</td>' +
        '<td>' + esc(o.customerName || '-') + (o.username ? (' @' + esc(o.username)) : '') + '<br/><span class="muted">' + esc(o.userId || '') + '</span></td>' +
        '<td>' + fmtMoney(o.amount || 0) + '</td>' +
        '<td>' + fmtTs(o.createdAt) + (o.paidAt ? ('<br/>Paid: ' + fmtTs(o.paidAt)) : '') + '</td>' +
        '<td style="white-space:pre-wrap">' + esc(delivered) + '</td>' +
        '<td>' + esc(o.status || '-') + '</td>' +
      '</tr>';
    }).join('');
    table.innerHTML = '<tr><th>Mă don</th><th>S?n ph?m</th><th>Khách mua</th><th>Giá tr?</th><th>Th?i gian</th><th>Chi ti?t dă giao</th><th>Tr?ng thái</th></tr>' + rows;
  } catch (e) {
    setMsg(e.message, false);
  }
}

function fmtMoney(v) {
  return Number(v || 0).toLocaleString('vi-VN') + 'd';
}

function fmtTs(ts) {
  if (!ts) return '-';
  try { return new Date(ts).toLocaleString('vi-VN'); } catch { return '-'; }
}

function esc(s) {
  return String(s || '').replace(/[&<>\"']/g, function(ch){
    return ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[ch];
  });
}

function escJs(s) {
  return String(s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

bootstrap();
</script>
</body>
</html>
